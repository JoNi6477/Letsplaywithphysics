    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0a0e1a; color: #e8eaf0; overflow-x: hidden; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; background: rgba(10,14,26,0.97); border-bottom: 1px solid rgba(100,180,255,0.12); position: sticky; top: 0; z-index: 100; }

    .nav-logo span { color: #44aaff; }

    .nav-links a { color: #a0aac0; font-size: 14px; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #44aaff; }
    .nav-cta { background: #44aaff; color: #0a0e1a; font-size: 13px; font-weight: 700; padding: 8px 20px; border-radius: 20px; text-decoration: none; }

    /* HAMBURGER */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #e8eaf0; border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* MOBILE MENU */
    .mobile-menu { display: none; flex-direction: column; background: rgba(10,14,26,0.99); border-bottom: 1px solid rgba(100,180,255,0.12); padding: 0 18px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.3s ease; }

    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: #44aaff; }
    .mobile-menu .mob-cta { margin-top: 14px; background: #44aaff; color: #0a0e1a; font-weight: 700; padding: 12px 20px; border-radius: 20px; text-align: center; border-bottom: none !important; }

    /* HERO */

    .hero-bg { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(44,120,255,0.13) 0%, transparent 70%); }
    .hero-orbit { position: absolute; width: 500px; height: 500px; border: 1px dashed rgba(100,180,255,0.1); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: spin 30s linear infinite; }
    .hero-orbit2 { position: absolute; width: 320px; height: 320px; border: 1px dashed rgba(100,180,255,0.08); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: spin 18s linear infinite reverse; }

    .hero p { font-size: 17px; color: #8090b0; max-width: 540px; line-height: 1.7; margin-bottom: 36px; position: relative; }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; position: relative; }
    .btn-primary { background: #44aaff; color: #0a0e1a; font-weight: 700; padding: 14px 32px; border-radius: 30px; text-decoration: none; font-size: 15px; transition: transform 0.2s; }
    .btn-primary:hover { transform: scale(1.04); }
    .btn-outline { border: 1px solid rgba(100,180,255,0.3); color: #7ab8ff; padding: 14px 32px; border-radius: 30px; text-decoration: none; font-size: 15px; transition: background 0.2s; }
    .btn-outline:hover { background: rgba(100,180,255,0.08); }
    .hero-stats { display: flex; gap: 40px; margin-top: 60px; position: relative; flex-wrap: wrap; justify-content: center; }

    .teacher-info { flex: 1; }
    .teacher-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }

    .teacher-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    .section { padding: 72px 40px; max-width: 1100px; margin: 0 auto; }

    .feat-card:hover { border-color: rgba(100,180,255,0.3); background: rgba(44,120,255,0.06); }
    .feat-icon { font-size: 28px; margin-bottom: 16px; }

    .feat-desc { font-size: 13px; color: #5a6a85; line-height: 1.6; }

    .batch-card.paid .batch-cta { background: rgba(247,201,72,0.15); color: #f7c948; }
